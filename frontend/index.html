<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="End-to-end AI model training, hyperparameter optimization, and ONNX export platform built with PyTorch, FastAPI, and React." />
    <title>AI Training Platform — Neural Workspace</title>
  </head>
  <body>
    <div id="root">
      <style>
        #initial-loader {
          position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
          background: #000510;
          display: flex; flex-direction: column; align-items: center; justify-content: center;
          color: #ffffff; font-family: -apple-system, sans-serif;
          z-index: 9999;
        }
        #initial-loader .spinner {
          width: 24px; height: 24px; border: 2px solid rgba(255,255,255,0.1);
          border-top-color: #1D9E75; border-radius: 50%;
          animation: spin 0.6s linear infinite; margin-bottom: 16px;
        }
        #initial-loader .text { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.5); }
        @keyframes spin { to { transform: rotate(360deg); } }
      </style>
      <div id="initial-loader">
        <div class="spinner"></div>
        <div class="text">INITIALIZING SYSTEM</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
